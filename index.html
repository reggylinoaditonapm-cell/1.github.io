<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>echobrick</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 1. Header Biru Penuh */
        .ecobrick-header {
            background-color: #05750e; /* Biru khas Unilever */
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* 2. Logo di Kiri */
        .logo-text {
            color: white;
            font-family: 'Times New Roman', serif; /* Font klasik mirip logo */
            font-size: 32px;
            font-weight: bold;
            text-decoration: none;
        }

        /* 3. Menu Oval Putih di Kanan */
        .nav-oval {
            background-color: white;
            border-radius: 50px; /* Membuat bentuk oval */
            padding: 5px 25px;
            display: flex;
            gap: 15px;
            list-style: none;
            margin: 0;
        }

        .nav-oval a {
            color: #005eb8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .nav-oval a:hover {
            text-decoration: underline;
        }

        /* 4. Bagian Hero (Teks Besar) */
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('gambar_beground_1.png') no-repeat center center/cover;
            height: 80vh;
            display: flex;
            align-items: center;
            padding-left: 10%;
        }

        .hero-text {
            color: #ffffff;
            font-size: 80px; /* Ukuran teks sangat besar */
            font-weight: 700;
            line-height: 1.1;
            max-width: 700px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>

    <header class="ecobrick-header">
        <a href="#" class="logo-text">Ecobrick</a>
        
        <ul class="nav-oval shadow-sm">
            <li><a href="#">alamat kami ⌵</a></li>
            <li><a href="#">Brand kami</a></li>
            <li><a href="#">Keberlanjutan ⌵</a></li>
            <li><a href="#">Berita</a></li>
            <li><a href="#">lokasi⌵</a></li>
            <li><a href="#">Karir</a></li>
        </ul>
    </header>

    <section class="hero-section">
        <div class="hero-text">
            Menciptakan <br>
            Daya Tarik dalam <br>
            Skala Luas
        </div>
    </section>

</body>
</html>
